name: Build & Deploy to Codeberg Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: codeberg-tiny
    container:
      image: node:20-bookworm

    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          cd demo/
          npm run build-only
        env:
          VITE_BASE_URL: /

      - name: Install deployment dependencies
        run: apt-get update && apt-get install -y lftp openssh-client

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SFTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u ${{ secrets.DEPLOY_USER }},$FTP_PASSWORD \
            sftp://${{ secrets.DEPLOY_HOST }} << EOF
            mirror -R --delete dist/ ${{ secrets.DEPLOY_PATH }}
            bye
          EOF
